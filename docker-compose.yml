services:
  doll:
    build: .
    image: jataware/doll:latest
    ports:
      - "5000:5000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /run/containerd/containerd.sock:/run/containerd/containerd.sock
    environment:
      - PROTOCOL_BUFFERS_PYTHON_IMPLEMENTATION=python
